name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6
    
    - name: Create version file
      run: |
        echo "{\"version\": \"${{ github.ref_name }}\", \"release_date\": \"$(Get-Date -Format 'yyyy-MM-dd')\"}" > version.json
    
    - name: Create Release ZIP
      run: |
        Compress-Archive -Path "*.py", "*.json", "README.md", "LICENSE" -DestinationPath "Impressao3DPro-${{ github.ref_name }}.zip"
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: "Impressao3DPro-*.zip"
        draft: false
        prerelease: false
        generate_release_notes: true